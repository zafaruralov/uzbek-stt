services:
  stt-web:
    build: .
    ports:
      - "7860:7860"
    volumes:
      - /root/stt:/app/stt:ro
      - /root/models:/models:ro
      - /root/.cache/huggingface:/root/.cache/huggingface:ro
    environment:
      # Switch models by changing STT_MODEL (local path or HF ID).
      # Set STT_MODEL_HF to the HuggingFace ID for display/link in the UI.
      #   /models/whisper-small-uz        → BlueRaccoon/whisper-small-uz
      #   /models/whisper-uzbek-medium    → aisha-org/Whisper-Uzbek
      #   RubaiLab/kotib_call_base_stt_15 → (auto-detected, no STT_MODEL_HF needed)
      - STT_MODEL=/models/kotib_call_base_stt_15
      - STT_MODEL_HF=RubaiLab/kotib_call_base_stt_15
      - LIVE_STT_URL=http://172.18.35.124:8000
      - HF_HOME=/root/.cache/huggingface
      - TRANSFORMERS_CACHE=/root/.cache/huggingface/hub
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]
    restart: unless-stopped

  stt-live:
    build:
      context: .
      dockerfile: Dockerfile.live
    ports:
      - "8000:8000"
    volumes:
      - /root/models:/models:ro
    command:
      - --model_dir
      - /models/kotib_call_base_stt_15_ct2
      - --lan
      - uz
      - --backend
      - faster-whisper
      - --backend-policy
      - localagreement
      - --no-vad
      - --confidence-validation
      - --min-chunk-size
      - "0.5"
      - --buffer_trimming
      - segment
      - --buffer_trimming_sec
      - "10"
      - -l
      - DEBUG
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]
    restart: unless-stopped
